				<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
					<span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="navbarNav">
					<ul class="navbar-nav ms-auto">
						<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

		<header class="py-5 mt-5">
			<div class="container text-center">
				<h1 class="display-3 fw-bold main-title" data-aos="fade-down">Moje <span class="text-gradient">Kadry</span></h1>
				<p class="lead text-secondary-custom mx-auto" style="max-width: 700px;" data-aos="fade-up" data-aos-delay="100">
					Fotografia mobilna i spontaniczne chwile. Lubię łapać światło i detale, które umykają w codziennym biegu.
				</p>
			</div>
		</header>

		<section class="container py-5">
			<div class="row g-4 photo-grid">
				<div class="col-6 col-md-4" data-aos="zoom-in" data-aos-delay="100">
					<div class="gallery-item shadow-lg">
						<img src="rynek.jpg" class="img-fluid thumb" data-bs-toggle="modal" data-bs-target="#photoModal" data-img="rynek.jpg" alt="Rynek">
						<div class="gallery-overlay"><span>Powiększ</span></div>
					</div>
				</div>
				<div class="col-6 col-md-4" data-aos="zoom-in" data-aos-delay="200">
					<div class="gallery-item shadow-lg">
						<img src="las.jpg" class="img-fluid thumb" data-bs-toggle="modal" data-bs-target="#photoModal" data-img="las.jpg" alt="Las">
						<div class="gallery-overlay"><span>Powiększ</span></div>
					</div>
				</div>
				<div class="col-6 col-md-4" data-aos="zoom-in" data-aos-delay="300">
					<div class="gallery-item shadow-lg">
						<img src="niebo.jpg" class="img-fluid thumb" data-bs-toggle="modal" data-bs-target="#photoModal" data-img="niebo.jpg" alt="Niebo">
						<div class="gallery-overlay"><span>Powiększ</span></div>
					</div>
				</div>
				<div class="col-6 col-md-4" data-aos="zoom-in" data-aos-delay="100">
					<div class="gallery-item shadow-lg">
						<img src="autko.jpg" class="img-fluid thumb" data-bs-toggle="modal" data-bs-target="#photoModal" data-img="autko.jpg" alt="Autko">
						<div class="gallery-overlay"><span>Powiększ</span></div>
					</div>
				</div>
				<div class="col-6 col-md-4" data-aos="zoom-in" data-aos-delay="200">
					<div class="gallery-item shadow-lg">
						<img src="bmw.jpg" class="img-fluid thumb" data-bs-toggle="modal" data-bs-target="#photoModal" data-img="bmw.jpg" alt="BMW">
						<div class="gallery-overlay"><span>Powiększ</span></div>
					</div>
				</div>
				<div class="col-6 col-md-4" data-aos="zoom-in" data-aos-delay="300">
					<div class="gallery-item shadow-lg">
						<img src="gory.jpg" class="img-fluid thumb" data-bs-toggle="modal" data-bs-target="#photoModal" data-img="gory.jpg" alt="Góry">
						<div class="gallery-overlay"><span>Powiększ</span></div>
					</div>
				</div>
				
				<div class="col-6 col-md-4" data-aos="zoom-in"><div class="gallery-item"><img src="bambi.jpg" class="img-fluid thumb" data-bs-toggle="modal" data-bs-target="#photoModal" data-img="bambi.jpg" alt="Bambi"><div class="gallery-overlay"><span>Powiększ</span></div></div></div>
				<div class="col-6 col-md-4" data-aos="zoom-in"><div class="gallery-item"><img src="odbicie.jpg" class="img-fluid thumb" data-bs-toggle="modal" data-bs-target="#photoModal" data-img="odbicie.jpg" alt="Odbicie"><div class="gallery-overlay"><span>Powiększ</span></div></div></div>
				<div class="col-6 col-md-4" data-aos="zoom-in"><div class="gallery-item"><img src="swiatlo.jpg" class="img-fluid thumb" data-bs-toggle="modal" data-bs-target="#photoModal" data-img="swiatlo.jpg" alt="Światło"><div class="gallery-overlay"><span>Powiększ</span></div></div></div>
			</div>
		</section>

		<footer class="py-5 text-center">
			<div class="container border-top border-secondary pt-4">
				<p class="text-secondary-custom">© 2026 Piotrek. Złapane w obiektywie.</p>
			</div>
		</footer>

		<div class="modal fade" id="photoModal" tabindex="-1">
			<div class="modal-dialog modal-dialog-centered modal-xl">
				<div class="modal-content bg-transparent border-0">
					<div class="modal-body p-0 position-relative text-center">
						<img src="" class="img-fluid rounded-4 shadow-2xl" id="modalImage" alt="">
						<button class="nav-arrow left" id="prevBtn">❮</button>
						<button class="nav-arrow right" id="nextBtn">❯</button>
						<button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal"></button>
					</div>
				</div>
			</div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.bundle.min.js"></script>
		<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
		<script>
			AOS.init({ duration: 800, once: true });

			const modal = document.getElementById("photoModal");
			const modalImg = document.getElementById("modalImage");
			const images = Array.from(document.querySelectorAll(".thumb"));
			let currentIndex = 0;

			function showImage(index) {
				if (index < 0) index = images.length - 1;
				if (index >= images.length) index = 0;
				currentIndex = index;
				modalImg.src = images[currentIndex].dataset.img;
			}

			modal.addEventListener("show.bs.modal", function (event) {
				const clickedImg = event.relatedTarget;
				currentIndex = images.indexOf(clickedImg);
				showImage(currentIndex);
			});

			document.getElementById("prevBtn").onclick = (e) => { e.stopPropagation(); showImage(currentIndex - 1); };
			document.getElementById("nextBtn").onclick = (e) => { e.stopPropagation(); showImage(currentIndex + 1); };

			document.addEventListener("keydown", (e) => {
				if (!modal.classList.contains("show")) return;
				if (e.key === "ArrowLeft") showImage(currentIndex - 1);
				if (e.key === "ArrowRight") showImage(currentIndex + 1);
			});
		</script>
	</body>
</html>
