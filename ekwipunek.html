    <style>
        .inventory-section { padding: 40px 0; min-height: 80vh; }
        .inventory-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .cat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .cat-card:hover { transform: translateY(-5px); border-color: #9b5cff; }
        .cat-card img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; margin-bottom: 10px; }
        .cat-card.locked { filter: grayscale(1) brightness(0.4); opacity: 0.6; cursor: not-allowed; }
        .cat-name { font-size: 0.85rem; font-weight: 600; color: #fff; }
        
        /* Kolory rzadkości */
        .rarity-Common { border-bottom: 4px solid #888; }
        .rarity-Rare { border-bottom: 4px solid #3498db; }
        .rarity-Epic { border-bottom: 4px solid #9b5cff; }
        .rarity-Legendary { border-bottom: 4px solid #f1c40f; box-shadow: 0 0 10px rgba(241, 196, 15, 0.2); }

        .modal-content { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; color: #fff; }
        #modalImg { border-radius: 15px; width: 100%; }

        function getUnlocked() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            } catch(e) { return []; }
        }

        function renderGrid(filter = "all") {
            const unlocked = getUnlocked();
            const grid = document.getElementById("catGrid");
            grid.innerHTML = "";

            kotkiData.forEach(cat => {
                // Filtrowanie (zwróć uwagę na wielkość liter w rarity!)
                if (filter !== "all" && cat.rarity !== filter) return;

                // Sprawdzanie czy kotek jest odblokowany
                const record = unlocked.find(u => u.id === cat.file);
                const isOwned = !!record;

                const div = document.createElement("div");
                div.className = `cat-card rarity-${cat.rarity} ${isOwned ? "" : "locked"}`;
                
                // USTAWIENIE POPRAWNEJ ŚCIEŻKI DO ZDJĘĆ
                const imgSrc = `img/kotki/${cat.file}.jpg`;

                div.innerHTML = `
                    <img src="${imgSrc}" onerror="this.src='https://placehold.co/200?text=Brak+Foto'">
                    <div class="cat-name">${isOwned ? cat.name : "???"}</div>
                    <div class="small text-muted">${isOwned ? "" : cat.rarity}</div>
                `;

                if (isOwned) {
                    div.onclick = () => openModal(cat, record.date);
                }
                grid.appendChild(div);
            });

            document.getElementById("collectionCounter").textContent = 
                `Odblokowane: ${unlocked.length} / ${kotkiData.length}`;
        }

        function openModal(cat, date) {
            document.getElementById("modalImg").src = `img/kotki/${cat.file}.jpg`;
            document.getElementById("modalName").textContent = cat.name;
            document.getElementById("modalDesc").textContent = cat.desc;
            document.getElementById("modalDate").textContent = "Złapany: " + new Date(date).toLocaleDateString();
            new bootstrap.Modal(document.getElementById('catModal')).show();
        }

        // Obsługa filtrów
        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll(".filter-btn").forEach(b => {
                    b.classList.replace('btn-purple-primary', 'btn-outline-light');
                });
                this.classList.replace('btn-outline-light', 'btn-purple-primary');
                renderGrid(this.dataset.filter);
            });
        });

        // Start
        window.onload = () => renderGrid();
    </script>
