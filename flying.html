<!doctype html>
<html lang="pl">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Flappy Cat 🐱 | Projekt</title>
		
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet" />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet" />
		<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
		
		<link rel="stylesheet" href="style.css" />

		<style>
			/* Stylizacja specjalnie pod grę Flying Cat */
			.game-section {
				padding: 40px 0;
				min-height: 80vh;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			.game-card {
				background: var(--glass);
				border: 1px solid var(--glass-border);
				backdrop-filter: blur(15px);
				border-radius: 28px;
				padding: 25px;
				box-shadow: 0 20px 50px rgba(0,0,0,0.3);
			}
			canvas {
				background: linear-gradient(#0c0718, #14082b);
				border-radius: 15px;
				max-width: 100%;
				height: auto;
				display: block;
				margin: 0 auto;
				border: 1px solid rgba(155, 92, 255, 0.3);
			}
			.controls-info {
				color: var(--secondary-custom);
				font-size: 0.9rem;
				margin-top: 15px;
			}
			.volume-control {
				max-width: 200px;
				margin: 10px auto;
			}
			input[type="range"] {
				accent-color: var(--accent-purple);
			}
		</style>
	</head>
	<body>

		<div class="blob-bg"></div>

		<nav class="navbar navbar-expand-lg navbar-dark sticky-top custom-nav">
			<div class="container">
				<a class="navbar-brand fw-bold" href="index.html">PIOTREK<span class="dot">.</span></a>
				<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
					<span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="navbarNav">
					<ul class="navbar-nav ms-auto">
						<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
						<li class="nav-item"><a class="nav-link active" href="projekty.html">Projekty</a></li>
						<li class="nav-item"><a class="nav-link" href="fotografia.html">Fotografia</a></li>
						<li class="nav-item"><a class="nav-link" href="kontakt.html">O mnie</a></li>
					</ul>
				</div>
			</div>
		</nav>

		<main class="game-section">
			<div class="container text-center" data-aos="zoom-in">
				<div class="game-card d-inline-block">
					<h2 class="fw-bold text-gradient mb-3">Latający Kotek</h2>
					
					<canvas id="gameCanvas" width="400" height="500"></canvas>

					<div class="controls-info">
						<p class="mb-1">Klikaj aby latać 🐾</p>
						<div class="volume-control">
							<label for="volume" class="form-label small">Głośność</label>
							<input type="range" class="form-range" id="volume" min="0" max="100" value="50" oninput="setVolume(this.value)">
						</div>
					</div>
				</div>
			</div>
		</main>

		<footer class="py-5 text-center mt-auto">
			<div class="container border-top border-secondary pt-4">
				<p class="text-secondary-custom mb-0">© 2026 Piotrek | Projekt: Flying Cat Engine</p>
			</div>
		</footer>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.bundle.min.js"></script>
		<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
		<script>
            AOS.init({ duration: 800, once: true });
			const canvas = document.getElementById("gameCanvas"); 
const ctx = canvas.getContext("2d");

			function resize() {
    // Dopasowanie do okna, ale z zachowaniem proporcji karty
    const container = document.querySelector('.game-card');
    canvas.width = Math.min(container.offsetWidth - 50, 400);
    canvas.height = 500;
}
resize();
window.addEventListener("resize", resize);

			// ===== AUDIO Z PLIKÓW =====
			// Wstaw ścieżki do swoich plików mp3
			const sndJump = new Audio("sounds/jump.mp3"); // dźwięk skoku
			const sndFish = new Audio("sounds/fish.mp3"); // zebranie rybki
			const sndHit = new Audio("sounds/hit.mp3"); // uderzenie w płot
			const sndBg = new Audio("sounds/bg.mp3"); // muzyka w tle
			sndBg.loop = true;
			sndBg.volume = 0.3;

			// ===== STAN =====
			let started = false;
			let gameOver = false;
			let frame = 0;
			let score = 0;

			// ===== KOTEK (EMOJI) =====
			const cat = {
				x: 90,
				y: canvas.height / 2,
				size: 30,
				velocity: 0,
				gravity: 0.14,
				jump: -4.2,
			};

			// ===== PRZESZKODY =====
			let fences = [];
			const gap = 200;
			const fenceWidth = 54;
			const speed = 3;

			// ===== RYBKI (EMOJI) =====
			let fishes = [];

			// ===== GWIAZDKI TŁA =====
			const stars = Array.from({ length: 45 }, () => ({
				x: Math.random() * canvas.width,
				y: Math.random() * canvas.height,
				r: Math.random() * 1.5 + 0.5,
				s: Math.random() * 0.25 + 0.1,
			}));

			// ===== INPUT =====
			function input() {
				if (!started) {
					started = true;
					sndBg.currentTime = 0;
					sndBg.play(); // 🔥 TEGO BRAKOWAŁO
					return;
				}
				if (gameOver) {
					reset();
					return;
				}
				cat.velocity = cat.jump;
				sndJump.currentTime = 0;
				sndJump.play();
			}
			window.addEventListener("click", input);
			window.addEventListener("touchstart", input);

			// ===== RESET =====
			function reset() {
				started = false;
				gameOver = false;
				frame = 0;
				score = 0;
				fences = [];
				fishes = [];
				cat.y = canvas.height / 2;
				cat.velocity = 0;
			}

			// ===== RYSOWANIE =====
			function drawCat() {
				ctx.font = "30px serif";
				ctx.fillText("🐱", cat.x - 15, cat.y + 15);
			}

			function drawFence(f) {
				const grad = ctx.createLinearGradient(f.x, 0, f.x + fenceWidth, 0);
				grad.addColorStop(0, "#3a0ca3");
				grad.addColorStop(1, "#7209b7");

				ctx.fillStyle = grad;
				ctx.shadowColor = "#b983ff";
				ctx.shadowBlur = 12;

				ctx.fillRect(f.x, 0, fenceWidth, f.top);
				ctx.fillRect(f.x, f.top + gap, fenceWidth, canvas.height);

				ctx.shadowBlur = 0;
			}

			function drawFish(f) {
				ctx.font = "22px serif";
				ctx.fillText("🐟", f.x - 11, f.y + 11);
			}

			// ===== UPDATE =====
			function update() {
				if (!started || gameOver) return;

				cat.velocity += cat.gravity;
				cat.velocity = Math.min(cat.velocity, 3.5);
				cat.y += cat.velocity;

				if (cat.y < 0 || cat.y > canvas.height) {
					gameOver = true;
					sndHit.play();
					sndBg.pause();
				}

				if (frame % 80 === 0) {
					const top = Math.random() * (canvas.height - gap - 160) + 80;
					fences.push({ x: canvas.width + 20, top, passed: false });
					fishes.push({ x: canvas.width + 20, y: top + gap / 2 });
				}

				fences.forEach((f) => {
					f.x -= speed;

					if (
						cat.x + cat.size / 2 > f.x &&
						cat.x - cat.size / 2 < f.x + fenceWidth &&
						(cat.y < f.top || cat.y > f.top + gap)
					) {
						gameOver = true;
						sndHit.play();
						sndBg.pause();
					}

					if (!f.passed && f.x + fenceWidth < cat.x) {
						f.passed = true;
						score++;
					}
				});

				fishes.forEach((f, i) => {
					f.x -= speed;
					if (Math.hypot(cat.x - f.x, cat.y - f.y) < 20) {
						score += 2;
						sndFish.currentTime = 0;
						sndFish.play();
						fishes.splice(i, 1);
					}
				});

				fences = fences.filter((f) => f.x + fenceWidth > 0);
				fishes = fishes.filter((f) => f.x > -20);
			}

			// ===== TŁO =====
			function drawBackground() {
				ctx.fillStyle = "#0c0718";
				ctx.fillRect(0, 0, canvas.width, canvas.height);

				ctx.fillStyle = "#b983ff";
				stars.forEach((s) => {
					s.y += s.s;
					if (s.y > canvas.height) s.y = 0;
					ctx.beginPath();
					ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
					ctx.fill();
				});
			}

			// ===== DRAW =====
			function draw() {
				drawBackground();
				fences.forEach(drawFence);
				fishes.forEach(drawFish);
				drawCat();

				ctx.fillStyle = "#e6ccff";
				ctx.font = "18px Arial";
				ctx.fillText("Wynik: " + score, 14, 26);

				if (!started) {
					ctx.fillStyle = "rgba(0,0,0,0.6)";
					ctx.fillRect(0, 0, canvas.width, canvas.height);
					ctx.fillStyle = "#e6ccff";
					ctx.font = "24px Arial";
					ctx.fillText(
						"Flappy Cat 🐱",
						canvas.width / 2 - 70,
						canvas.height / 2,
					);
					ctx.font = "14px Arial";
					ctx.fillText(
						"Kliknij, aby zacząć (chill)",
						canvas.width / 2 - 90,
						canvas.height / 2 + 22,
					);
				}

				if (gameOver) {
					ctx.fillStyle = "rgba(0,0,0,0.7)";
					ctx.fillRect(0, 0, canvas.width, canvas.height);
					ctx.fillStyle = "#ffccff";
					ctx.font = "22px Arial";
					ctx.fillText(
						"Spokojnie 😼",
						canvas.width / 2 - 60,
						canvas.height / 2,
					);
					ctx.font = "14px Arial";
					ctx.fillText(
						"Kliknij, żeby spróbować jeszcze raz",
						canvas.width / 2 - 115,
						canvas.height / 2 + 24,
					);
				}
			}

			// ===== LOOP =====
			function loop() {
				frame++;
				update();
				draw();
				requestAnimationFrame(loop);
			}
			loop();

			const volumeSlider = document.getElementById("volume");

			function setVolume(v) {
				const vol = v * 0.01;
				sndJump.volume = 0.6 * vol;
				sndFish.volume = 0.7 * vol;
				sndHit.volume = 0.8 * vol;
				sndBg.volume = 0.25 * vol;
			}

			setVolume(volumeSlider.value);

			volumeSlider.addEventListener("input", (e) => {
				setVolume(e.target.value);
			});
		</script>
	</body>
</html>
