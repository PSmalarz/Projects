		<style>
			/* Stylizacja specyficzna dla mechaniki Case Opening */
			.game-container {
				padding: 60px 0;
				min-height: 80vh;
				display: flex;
				align-items: center;
			}
			.case-card {
				background: var(--glass);
				border: 1px solid var(--glass-border);
				backdrop-filter: blur(15px);
				border-radius: 28px;
				padding: 40px;
				max-width: 800px;
				width: 100%;
			}
			.case-container {
				overflow: hidden;
				width: 100%;
				height: 160px;
				border: 2px solid var(--accent-purple);
				border-radius: 16px;
				position: relative;
				background: rgba(0, 0, 0, 0.3);
				margin: 25px 0;
			}
			.case-strip {
				display: flex;
				gap: 12px;
				position: absolute;
				top: 10px;
				left: 0;
				transition: transform 9s cubic-bezier(0.06, 0.9, 0.12, 1);
			}
			.case-item {
				width: 130px;
				flex-shrink: 0;
				background: rgba(255, 255, 255, 0.05);
				border-radius: 12px;
				padding: 8px;
				border: 2px solid #333;
				text-align: center;
			}
			.case-item img {
				width: 100%;
				height: 100px;
				object-fit: cover;
				border-radius: 8px;
			}
			.case-item p {
				font-size: 0.75rem;
				margin-top: 5px;
				color: #eee;
				white-space: nowrap;
				overflow: hidden;
			}
			.pointer {
				position: absolute;
				top: 0;
				bottom: 0;
				left: 50%;
				width: 4px;
				background: var(--accent-purple);
				transform: translateX(-50%);
				z-index: 10;
				box-shadow: 0 0 15px var(--accent-purple);
			}
			#kotekImg {
				max-width: 100%;
				border-radius: 20px;
				border: 1px solid var(--glass-border);
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
			}
			.rarity-Common {
				border-color: #777;
			}
			.rarity-Epic {
				border-color: #b366ff;
				box-shadow: inset 0 0 10px rgba(179, 102, 255, 0.2);
			}
			.rarity-Mythic {
				border-color: #ff4d4d;
				box-shadow: 0 0 15px rgba(255, 77, 77, 0.4);
			}

			const STORAGE_KEY = "unlocked_cats";
			// To ładuje już posiadane kotki z pamięci przy starcie strony
			let unlocked = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

			function openCase() {
				if (isOpening) return;
				isOpening = true;

				const ITEM_WIDTH = 142;
				const WIN_INDEX = 12;
				const strip = document.getElementById("caseStrip");
				const container = document.querySelector(".case-container");

				document.getElementById("resultArea").style.display = "none";
				strip.style.transition = "none";
				strip.style.transform = "translateX(0)";
				strip.innerHTML = "";
				void strip.offsetWidth; // force reflow

				// Generowanie paska losowania
				const items = [];
				for (let i = 0; i < 25; i++) {
					const randomCat =
						kotkiData[Math.floor(Math.random() * kotkiData.length)];
					items.push(randomCat);
				}
				const finalCat =
					kotkiData[Math.floor(Math.random() * kotkiData.length)];
				items[WIN_INDEX] = finalCat;

				items.forEach((cat) => {
					const div = document.createElement("div");
					div.className = `case-item rarity-${cat.rarity || "Common"}`;
					// UWAGA: Ścieżka img/kotki/
					div.innerHTML = `<img src="img/kotki/${cat.file}.jpg"><p>${cat.name}</p>`;
					strip.appendChild(div);
				});

				const centerOffset =
					WIN_INDEX * ITEM_WIDTH - container.offsetWidth / 2 + ITEM_WIDTH / 2;

				setTimeout(() => {
					strip.style.transition = "9s cubic-bezier(0.06, 0.9, 0.12, 1)";
					strip.style.transform = `translateX(-${centerOffset}px)`;
					sndCaseOpen.play().catch(() => {});
				}, 50);

				setTimeout(() => showResult(finalCat), 9000);
			}

			function showResult(cat) {
				isOpening = false;
				sndCaseOpen.pause();
				sndCaseWin.play().catch(() => {});

				const isDuplicate = unlocked.some((u) => u.id === cat.file);
				if (!isDuplicate) {
					// 2. Jeśli go nie ma, dodajemy NOWY OBIEKT z ID i DATĄ
					unlocked.push({
						id: cat.file,
						date: new Date().toISOString(),
					});

					// 3. ZAPISUJEMY całą tablicę do pamięci (TO JEST KLUCZOWE)
					localStorage.setItem(STORAGE_KEY, JSON.stringify(unlocked));
					console.log("Zapisano nowego kotka:", cat.file);
				} else {
					console.log("To duplikat, nie zapisuję.");
				}

				// POKAZYWANIE WYNIKU
				document.getElementById("resultArea").style.display = "block";
				document.getElementById("kotekImg").src = `img/kotki/${cat.file}.jpg`;
				document.getElementById("kotekName").textContent = `${cat.name}`;

				// TA LINIA BYŁA POTRZEBNA:
				document.getElementById("kotekDescResult").textContent = cat.desc;

				// Ukrywamy stary tekst instrukcji, żeby nie robić bałaganu
				document.getElementById("kotekDesc").style.display = "none";

				document.getElementById("dropInfo").textContent = isDuplicate
					? "❌ DUPLIKAT"
					: "🎉 NOWY!";
				document.getElementById("catFact").textContent =
					catFacts[Math.floor(Math.random() * catFacts.length)];

				updateCounter();
			}

			function updateCounter() {
				document.getElementById("collectionCounter").textContent =
					`Odblokowane: ${unlocked.length} / ${kotkiData.length}`;
			}

			document
				.getElementById("openCaseBtn")
				.addEventListener("click", openCase);
			updateCounter();
